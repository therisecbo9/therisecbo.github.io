<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="images/logo.png" alt="The Rise CBO Logo">
                <span>The Rise CBO</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- HEADER -->
    <section class="page-header">
        <h1>Contact Us</h1>
        <p>We would love to hear from you</p>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-container">

        <!-- CONTACT DETAILS -->
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p><strong>📍 Location:</strong> Kahawa West, Nairobi</p>
            <p><strong>📞 Phone:</strong> 0799 841 297</p>
            <p><strong>📧 Email:</strong> trogsrurie@gmail.com</p>

            <a href="https://wa.me/254799841297" class="btn">Chat on WhatsApp</a>
        </div>

        <!-- CONTACT FORM -->
        <div class="contact-form">
            <h2>Send a Message</h2>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 The Rise CBO | Kahawa West, Nairobi</p>
    </footer>

</body>
</html>
